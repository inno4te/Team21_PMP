  const input = { width:"100%", padding:"12px 14px", background:"rgba(255,255,255,0.06)", border:"1px solid rgba(201,168,76,0.3)", borderRadius:6, color:"white", fontSize:15, fontFamily:"Georgia,serif", boxSizing:"border-box" };

  return (
    <div style={wrap}>
      <div style={{ maxWidth:500, width:"100%" }}>
        <div style={{ textAlign:"center", marginBottom:36 }}>
          <div style={{ width:80, height:80, borderRadius:"50%", border:"3px solid "+G, background:"rgba(201,168,76,0.1)", display:"flex", alignItems:"center", justifyContent:"center", margin:"0 auto 14px", fontSize:32 }}>🎓</div>
          <div style={{ fontSize:26, fontWeight:"bold", color:G, letterSpacing:3, marginBottom:5 }}>TEAM21 ACADEMY</div>
          <div style={{ fontSize:12, color:"#8899CC", letterSpacing:2, marginBottom:10 }}>PMP EXAM PREPARATION PLATFORM</div>
          <div style={{ width:50, height:1, background:G, margin:"0 auto 10px", opacity:0.6 }}></div>
          <div style={{ fontSize:12, color:"#667799", fontStyle:"italic" }}>Unlocking Potential — Innocent Forteh, PMP</div>
        </div>

        <div style={card}>
          <h2 style={{ color:"white", fontSize:18, marginBottom:22, textAlign:"center", fontWeight:"normal", letterSpacing:1 }}>Sign In to Begin Your Exam</h2>

          <div style={{ marginBottom:16 }}>
            <label style={label}>FULL NAME</label>
            <input value={name} onChange={e => setName(e.target.value)} placeholder="Enter your full name" style={input} onKeyDown={e => e.key==='Enter' && handleStart()} />
          </div>
          <div style={{ marginBottom:18 }}>
            <label style={label}>EMAIL ADDRESS</label>
            <input value={email} onChange={e => setEmail(e.target.value)} placeholder="Enter your email address" style={input} onKeyDown={e => e.key==='Enter' && handleStart()} />
          </div>
          <div style={{ marginBottom:22 }}>
            <label style={label}>SELECT EXAM TYPE</label>
            {exams.map(exam => (
              <div key={exam.id} onClick={() => setSelectedExam(exam.id)} style={{ display:"flex", alignItems:"center", gap:10, padding:"10px 14px", marginBottom:6, background:selectedExam===exam.id?"rgba(201,168,76,0.15)":"rgba(255,255,255,0.03)", border:"1px solid "+(selectedExam===exam.id?G:"rgba(255,255,255,0.1)"), borderRadius:6, cursor:"pointer" }}>
                <div style={{ width:14, height:14, borderRadius:"50%", border:"2px solid "+(selectedExam===exam.id?G:"#444"), background:selectedExam===exam.id?G:"transparent", flexShrink:0 }}></div>
                <span style={{ color:selectedExam===exam.id?"white":"#AAB8D0", fontSize:13 }}>{exam.label}</span>
              </div>
            ))}
          </div>

          {error && <div style={{ color:"#ff6b6b", fontSize:13, marginBottom:14, textAlign:"center" }}>{error}</div>}

          <button onClick={handleStart} style={{ width:"100%", padding:"14px", background:"linear-gradient(135deg,#C9A84C,#A07A30)", border:"none", borderRadius:8, color:DARK, fontSize:15, fontWeight:"bold", letterSpacing:1.5, cursor:"pointer", fontFamily:"Georgia,serif" }}>
            BEGIN EXAMINATION →
          </button>
          <p style={{ textAlign:"center", color:"#556677", fontSize:11, marginTop:14 }}>Certified by Innocent Forteh, PMP · Team21 Academy, Cameroon</p>
        </div>
      </div>
    </div>
  );
}

// ── EXAM SCREEN ────────────────────────────────────────────────────────────────
function ExamScreen({ student, onComplete }) {
  const [questions] = useState(() => {
    let pool = [...QUESTION_BANK];
    if (student.exam.domain) pool = pool.filter(q => q.domain === student.exam.domain);
    pool = shuffle(pool);
    return pool.slice(0, Math.min(student.exam.questions, pool.length));
  });

  const [batchStart, setBatchStart] = useState(0);
  const [allAnswers, setAllAnswers] = useState({});
  const [batchAnswers, setBatchAnswers] = useState({});
  const [showReview, setShowReview] = useState(false);
  const [timeLeft, setTimeLeft] = useState(student.exam.questions * 75);
  const timerRef = useRef(null);

  const BATCH = 10;
  const batchEnd = Math.min(batchStart + BATCH, questions.length);
  const currentBatch = questions.slice(batchStart, batchEnd);
  const totalBatches = Math.ceil(questions.length / BATCH);
  const batchNum = Math.floor(batchStart / BATCH) + 1;
  const answered = Object.keys(allAnswers).length + Object.keys(batchAnswers).length;
  const progress = Math.round((answered / questions.length) * 100);

  useEffect(() => {
    timerRef.current = setInterval(() => setTimeLeft(t => t > 0 ? t - 1 : 0), 1000);
    return () => clearInterval(timerRef.current);
  }, []);

  const fmt = (s) => {
    const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
    return (h > 0 ? h + ':' : '') + String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
  };

  const submitBatch = () => {
    setAllAnswers(prev => Object.assign({}, prev, batchAnswers));
    setShowReview(true);
  };

  const nextBatch = () => {
    const merged = Object.assign({}, allAnswers, batchAnswers);
    const newStart = batchStart + BATCH;
    if (newStart >= questions.length) {
      clearInterval(timerRef.current);
      const correct = questions.filter(q => merged[q.id] === q.answer).length;
      const score = Math.round((correct / questions.length) * 100);
      onComplete({ answers: merged, score, correct, total: questions.length, questions });
    } else {
      setAllAnswers(merged);
      setBatchStart(newStart);
      setBatchAnswers({});
      setShowReview(false);
      window.scrollTo(0, 0);
    }
  };

  const allBatchDone = currentBatch.every(q => batchAnswers[q.id] !== undefined);

  if (showReview) {
    const batchCorrect = currentBatch.filter(q => batchAnswers[q.id] === q.answer).length;
    const batchPct = Math.round((batchCorrect / currentBatch.length) * 100);
    const domainMap = {};
    currentBatch.forEach(q => {
      if (!domainMap[q.domain]) domainMap[q.domain] = { c:0, t:0 };
      domainMap[q.domain].t++;
      if (batchAnswers[q.id] === q.answer) domainMap[q.domain].c++;
    });

    return (
      <div style={{ minHeight:"100vh", background:"#0A0F1E", fontFamily:"Georgia,serif", padding:"20px" }}>
        <div style={{ maxWidth:860, margin:"0 auto" }}>
          <div style={{ background:"linear-gradient(135deg,#1A2B5E,#0D1428)", border:"1px solid rgba(201,168,76,0.4)", borderRadius:12, padding:28, marginBottom:24, textAlign:"center" }}>
            <div style={{ fontSize:12, color:"#8899CC", letterSpacing:2, marginBottom:8 }}>BATCH {batchNum} OF {totalBatches} — REVIEW</div>
            <div style={{ fontSize:56, fontWeight:"bold", color:batchPct>=70?"#4CAF50":"#FF6B6B", marginBottom:8 }}>{batchPct}%</div>
            <div style={{ fontSize:16, color:"white", marginBottom:6 }}>{batchCorrect} of {currentBatch.length} correct</div>
            <div style={{ display:"flex", justifyContent:"center", gap:16, flexWrap:"wrap", marginTop:14 }}>
              {Object.entries(domainMap).map(([d, s]) => (
                <div key={d} style={{ background:"rgba(255,255,255,0.05)", border:"1px solid rgba(201,168,76,0.2)", borderRadius:8, padding:"8px 16px" }}>
                  <div style={{ fontSize:10, color:"#8899CC", marginBottom:2 }}>{d}</div>
                  <div style={{ fontSize:16, color:s.c===s.t?"#4CAF50":s.c/s.t>=0.5?"#FFC107":"#FF6B6B", fontWeight:"bold" }}>{s.c}/{s.t}</div>
                </div>
              ))}
            </div>
            <div style={{ marginTop:14, padding:"10px 20px", background:batchPct>=70?"rgba(76,175,80,0.12)":"rgba(255,107,107,0.12)", borderRadius:8, border:"1px solid "+(batchPct>=70?"#4CAF50":"#FF6B6B"), display:"inline-block" }}>
              <span style={{ color:batchPct>=70?"#4CAF50":"#FF6B6B", fontSize:13 }}>
                {batchPct>=90?"🏆 Outstanding — Excellent performance this batch!" : batchPct>=70?"✅ Good Pass — Above the 70% PMP threshold." : "⚠️ Below Threshold — Review these topics before exam day."}
              </span>
            </div>
          </div>

          {currentBatch.map((q, idx) => {
            const ua = batchAnswers[q.id];
            const ok = ua === q.answer;
            return (
              <div key={q.id} style={{ background:"rgba(255,255,255,0.03)", border:"1px solid "+(ok?"rgba(76,175,80,0.4)":"rgba(255,107,107,0.4)"), borderRadius:12, padding:24, marginBottom:18 }}>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:10 }}>
                  <div>
                    <span style={{ background:ok?"rgba(76,175,80,0.2)":"rgba(255,107,107,0.2)", color:ok?"#4CAF50":"#FF6B6B", padding:"2px 10px", borderRadius:20, fontSize:11, marginRight:8 }}>{ok?"✓ CORRECT":"✗ INCORRECT"}</span>
                    <span style={{ color:G, fontSize:11 }}>{q.domain} · {q.topic}</span>
                  </div>
                  <span style={{ color:"#556677", fontSize:11 }}>Q{batchStart+idx+1}</span>
                </div>
                <p style={{ color:"white", fontSize:14, lineHeight:1.75, marginBottom:14 }}>{q.question}</p>
                {q.options.map((opt, oi) => {
                  let bg = "rgba(255,255,255,0.03)";
                  let bc = "rgba(255,255,255,0.08)";
                  let tc = "#8899AA";
                  if (oi === q.answer) { bg="rgba(76,175,80,0.15)"; bc="#4CAF50"; tc="#81C784"; }
                  else if (oi === ua && !ok) { bg="rgba(255,107,107,0.15)"; bc="#FF6B6B"; tc="#EF9A9A"; }
                  return (
                    <div key={oi} style={{ display:"flex", alignItems:"flex-start", gap:10, padding:"10px 14px", marginBottom:6, background:bg, border:"1px solid "+bc, borderRadius:6 }}>
                      <span style={{ color:tc, fontSize:13, minWidth:20, flexShrink:0 }}>{oi===q.answer?"✓":oi===ua&&!ok?"✗":String.fromCharCode(65+oi)+"."}</span>
                      <span style={{ color:tc, fontSize:13, lineHeight:1.5 }}>{opt}</span>
                    </div>
                  );
                })}
                <div style={{ marginTop:14, padding:"14px 16px", background:"rgba(201,168,76,0.07)", border:"1px solid rgba(201,168,76,0.25)", borderRadius:8 }}>
                  <div style={{ fontSize:11, color:G, letterSpacing:1, marginBottom:6 }}>💡 RATIONALE</div>
                  <p style={{ color:"#C8D8E8", fontSize:13, lineHeight:1.75 }}>{q.rationale}</p>
                </div>
              </div>
            );
          })}

          <div style={{ textAlign:"center", padding:"20px 0 40px" }}>
            <button onClick={nextBatch} style={{ padding:"16px 48px", background:"linear-gradient(135deg,#C9A84C,#A07A30)", border:"none", borderRadius:8, color:DARK, fontSize:15, fontWeight:"bold", cursor:"pointer", letterSpacing:1, fontFamily:"Georgia,serif" }}>
              {batchStart + BATCH >= questions.length ? "COMPLETE EXAM & VIEW RESULTS →" : "CONTINUE TO BATCH " + (batchNum+1) + " →"}
            </button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ minHeight:"100vh", background:"#0A0F1E", fontFamily:"Georgia,serif" }}>
      <div style={{ background:"rgba(13,20,40,0.97)", borderBottom:"1px solid rgba(201,168,76,0.2)", padding:"12px 24px", position:"sticky", top:0, zIndex:100, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <div style={{ display:"flex", alignItems:"center", gap:14 }}>
          <span style={{ color:G, fontWeight:"bold" }}>TEAM21 ACADEMY</span>
          <span style={{ color:"#556677" }}>|</span>
          <span style={{ color:"#8899CC", fontSize:12 }}>{student.exam.label}</span>
        </div>
        <div style={{ display:"flex", gap:24 }}>
          <div style={{ textAlign:"center" }}>
            <div style={{ fontSize:9, color:"#556677", letterSpacing:1 }}>TIME</div>
            <div style={{ fontSize:16, color:timeLeft<300?"#FF6B6B":G, fontWeight:"bold" }}>{fmt(timeLeft)}</div>
          </div>
          <div style={{ textAlign:"center" }}>
            <div style={{ fontSize:9, color:"#556677", letterSpacing:1 }}>PROGRESS</div>
            <div style={{ fontSize:16, color:"white" }}>{answered}/{questions.length}</div>
          </div>
        </div>
      </div>
      <div style={{ height:3, background:"rgba(255,255,255,0.05)" }}>
        <div style={{ height:"100%", width:progress+"%", background:"linear-gradient(90deg,#C9A84C,#4CAF50)", transition:"width 0.3s" }}></div>
      </div>

      <div style={{ maxWidth:800, margin:"0 auto", padding:"24px 20px" }}>
        <div style={{ marginBottom:22, padding:"14px 20px", background:"rgba(255,255,255,0.03)", border:"1px solid rgba(201,168,76,0.2)", borderRadius:8, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <div>
            <span style={{ color:G, fontWeight:"bold" }}>Batch {batchNum} of {totalBatches}</span>
            <span style={{ color:"#556677", margin:"0 10px" }}>·</span>
            <span style={{ color:"#8899CC", fontSize:13 }}>Questions {batchStart+1}–{batchEnd}</span>
          </div>
          <span style={{ color:"#667788", fontSize:12 }}>{student.name}</span>
        </div>

        {currentBatch.map((q, idx) => {
          const sel = batchAnswers[q.id];
          return (
            <div key={q.id} style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:12, padding:24, marginBottom:18 }}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:10 }}>
                <span style={{ color:G, fontSize:12, background:"rgba(201,168,76,0.1)", padding:"3px 10px", borderRadius:20 }}>{q.domain} · {q.topic}</span>
                <span style={{ color:"#556677", fontSize:12 }}>Q{batchStart+idx+1}</span>
              </div>
              <p style={{ color:"white", fontSize:15, lineHeight:1.8, marginBottom:18 }}>{q.question}</p>
              {q.options.map((opt, oi) => (
                <div key={oi} onClick={() => setBatchAnswers(prev => Object.assign({}, prev, {[q.id]: oi}))} style={{ display:"flex", alignItems:"flex-start", gap:12, padding:"12px 16px", marginBottom:8, background:sel===oi?"rgba(201,168,76,0.12)":"rgba(255,255,255,0.02)", border:"1px solid "+(sel===oi?G:"rgba(255,255,255,0.08)"), borderRadius:8, cursor:"pointer" }}>
                  <div style={{ width:20, height:20, borderRadius:"50%", border:"2px solid "+(sel===oi?G:"#334455"), background:sel===oi?G:"transparent", flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, color:sel===oi?DARK:"transparent", fontWeight:"bold" }}>✓</div>
                  <span style={{ color:sel===oi?"white":"#8899AA", fontSize:14, lineHeight:1.6 }}>{String.fromCharCode(65+oi)}. {opt}</span>
                </div>
              ))}
            </div>
          );
        })}

        <div style={{ textAlign:"center", padding:"16px 0 40px" }}>
          <div style={{ marginBottom:10, fontSize:13, color:"#556677" }}>
            {allBatchDone ? "All " + currentBatch.length + " questions answered. Ready to submit!" : currentBatch.filter(q => batchAnswers[q.id]!==undefined).length + " of " + currentBatch.length + " answered."}
          </div>
          <button onClick={submitBatch} disabled={!allBatchDone} style={{ padding:"14px 40px", background:allBatchDone?"linear-gradient(135deg,#C9A84C,#A07A30)":"rgba(255,255,255,0.05)", border:allBatchDone?"none":"1px solid rgba(255,255,255,0.1)", borderRadius:8, color:allBatchDone?DARK:"#445566", fontSize:15, fontWeight:"bold", cursor:allBatchDone?"pointer":"not-allowed", letterSpacing:1, fontFamily:"Georgia,serif" }}>
            SUBMIT BATCH & REVIEW ANSWERS
          </button>
        </div>
      </div>
    </div>
  );
}

// ── RESULTS SCREEN ─────────────────────────────────────────────────────────────
function ResultsScreen({ student, result, onRetake }) {
  const { score, correct, total, answers, questions } = result;
  const passed = score >= PASS_SCORE;
  const today = new Date().toLocaleDateString("en-US", { year:"numeric", month:"long", day:"numeric" });

  const domainStats = {};
  if (questions) questions.forEach(q => {
    if (!domainStats[q.domain]) domainStats[q.domain] = { c:0, t:0 };
    domainStats[q.domain].t++;
    if (answers[q.id] === q.answer) domainStats[q.domain].c++;
  });

  return (
    <div style={{ minHeight:"100vh", background:"#0A0F1E", fontFamily:"Georgia,serif", padding:"30px 20px" }}>
      <div style={{ maxWidth:700, margin:"0 auto" }}>
        <div style={{ textAlign:"center", padding:"36px 30px", background:"linear-gradient(135deg,#1A2B5E,#0D1428)", border:"2px solid "+(passed?G:"rgba(255,107,107,0.5)"), borderRadius:16, marginBottom:26 }}>
          <div style={{ fontSize:13, color:"#8899CC", letterSpacing:3, marginBottom:14 }}>FINAL EXAM RESULTS</div>
          <div style={{ fontSize:80, fontWeight:"bold", color:passed?G:"#FF6B6B", lineHeight:1 }}>{score}%</div>
          <div style={{ fontSize:18, color:passed?G:"#FF6B6B", marginTop:12, marginBottom:8 }}>
            {passed ? "🏆 CONGRATULATIONS — EXAM PASSED!" : "📚 KEEP STUDYING — YOU CAN DO IT!"}
          </div>
          <div style={{ fontSize:14, color:"#8899AA", marginBottom:8 }}>{correct} correct out of {total} questions</div>
          <div style={{ fontSize:13, color:"#667788", marginBottom:6 }}>PMP Passing Threshold: {PASS_SCORE}% · Your Score: {score}%</div>
          <div style={{ marginTop:10, padding:"8px 20px", background:passed?"rgba(76,175,80,0.1)":"rgba(255,107,107,0.1)", borderRadius:20, display:"inline-block" }}>
            <span style={{ color:passed?"#4CAF50":"#FF6B6B", fontSize:13 }}>
              {score>=90?"Above Target — Outstanding Performance" : score>=70?"Meets Requirement — Good Performance" : score>=55?"Approaching — More Preparation Needed" : "Below Requirement — Focus on Weak Areas"}
            </span>
          </div>
        </div>

        <div style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:12, padding:24, marginBottom:22 }}>
          <h3 style={{ color:G, marginBottom:16, fontWeight:"normal", letterSpacing:1, fontSize:13 }}>PERFORMANCE BY DOMAIN</h3>
          {[["People","👥"],["Process","⚙️"],["Business Environment","🏢"]].map(([d, icon]) => {
            const s = domainStats[d];
            if (!s) return null;
            const pct = Math.round((s.c / s.t) * 100);
            return (
              <div key={d} style={{ marginBottom:16 }}>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
                  <span style={{ color:"white", fontSize:14 }}>{icon} {d}</span>
                  <span style={{ color:pct>=70?"#4CAF50":"#FF6B6B", fontWeight:"bold" }}>{s.c}/{s.t} ({pct}%)</span>
                </div>
                <div style={{ height:8, background:"rgba(255,255,255,0.05)", borderRadius:4 }}>
                  <div style={{ height:"100%", width:pct+"%", background:pct>=70?"linear-gradient(90deg,#4CAF50,#81C784)":"linear-gradient(90deg,#FF6B6B,#EF9A9A)", borderRadius:4, transition:"width 1s" }}></div>
                </div>
              </div>
            );
          })}
        </div>

        <div style={{ display:"grid", gap:12, marginBottom:30 }}>
          {passed && (
            <button onClick={() => openCertificate(student.name, score, student.exam.label, today)} style={{ padding:"16px", background:"linear-gradient(135deg,#C9A84C,#A07A30)", border:"none", borderRadius:8, color:DARK, fontSize:15, fontWeight:"bold", cursor:"pointer", fontFamily:"Georgia,serif", letterSpacing:1 }}>
              🎓 PRINT CERTIFICATE OF ACHIEVEMENT
            </button>
          )}
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
            <button onClick={onRetake} style={{ padding:"14px", background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.15)", borderRadius:8, color:"white", fontSize:13, cursor:"pointer", fontFamily:"Georgia,serif" }}>
              🔄 Take Another Exam
            </button>
            <button onClick={() => window.print()} style={{ padding:"14px", background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.15)", borderRadius:8, color:"white", fontSize:13, cursor:"pointer", fontFamily:"Georgia,serif" }}>
              🖨️ Print Results
            </button>
          </div>
        </div>

        <div style={{ textAlign:"center", color:"#334455", fontSize:11, borderTop:"1px solid rgba(255,255,255,0.05)", paddingTop:18 }}>
          Team21 Academy PMP Prep Platform · Certified by Innocent Forteh, PMP<br/>
          Unlocking Potential · team21online@gmail.com · Yaoundé, Cameroon
        </div>
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App() {
  const [phase, setPhase] = useState("login");
  const [student, setStudent] = useState(null);
  const [result, setResult] = useState(null);

  const handleLogin = (s) => { setStudent(s); setPhase("exam"); };
  const handleComplete = (r) => { setResult(r); setPhase("results"); };
  const handleRetake = () => { setStudent(null); setResult(null); setPhase("login"); };

  if (phase === "login") return <LoginScreen onLogin={handleLogin} />;
  if (phase === "exam") return <ExamScreen student={student} onComplete={handleComplete} />;
  if (phase === "results") return <ResultsScreen student={student} result={result} onRetake={handleRetake} />;
  return null;
}

const rootEl = document.getElementById('root');
ReactDOM.createRoot(rootEl).render(<App />);
</script>
</body>
